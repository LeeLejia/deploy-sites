<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>律师文档助手</title>
<link rel="stylesheet" href="style.css">

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/mammoth@1.8.0/mammoth.browser.min.js"></script>
<script src="https://unpkg.com/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tinymce@6.8.2/tinymce.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>

<!-- Header -->
<header class="header">
  <div class="header-left">
    <h1 class="header-title">律师文档助手</h1>
    <span class="header-desc">导入 · 检索 · 合并 · 导出</span>
  </div>
  <div class="header-actions">
    <button class="btn btn-primary" id="btnImportDir">
      <span class="btn-icon-left">📁</span> 导入文件夹
    </button>
    <button class="btn btn-primary" id="btnImportFiles">
      <span class="btn-icon-left">📄</span> 导入文件
    </button>
    <button class="btn btn-ghost" id="btnClearAll">清空数据</button>
  </div>
</header>

<!-- Main layout -->
<main class="main">

  <!-- Left: File tree -->
  <aside class="panel panel-files">
    <div class="panel-header">
      <h2>文件管理</h2>
      <span class="badge" id="fileStats">0</span>
    </div>
    <div class="panel-notice hidden" id="editNotice">
      ⚠️ 文件编辑仅保存在浏览器内存中，刷新页面后修改将丢失
    </div>
    <div class="file-tree" id="fileTree">
      <div class="empty-hint">
        <div class="empty-icon">📂</div>
        <p>点击「导入文件夹」开始使用</p>
        <p class="empty-sub">支持 PDF / DOCX / PNG / JPG</p>
      </div>
    </div>
  </aside>

  <!-- Center: Search + Preview -->
  <section class="panel panel-center">
    <div class="search-bar">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="输入关键字搜索文件内容..." />
      <span class="search-count" id="searchCount"></span>
    </div>
    <div class="center-content" id="centerContent">
      <div class="empty-hint">
        <div class="empty-icon">🔍</div>
        <p>输入关键字搜索文件内容</p>
        <p class="empty-sub">或点击左侧文件进行预览</p>
      </div>
    </div>
  </section>

  <!-- Right: Buffer zone -->
  <aside class="panel panel-buffer">
    <div class="panel-header">
      <h2>已选文件</h2>
      <span class="badge" id="bufferCount">0</span>
    </div>
    <div class="buffer-list" id="bufferList">
      <div class="empty-hint">
        <div class="empty-icon">📋</div>
        <p>从搜索结果或文件树中</p>
        <p>选择文件添加到这里</p>
      </div>
    </div>
    <div class="buffer-actions">
      <button class="btn btn-secondary" id="btnClearBuffer" disabled>清空列表</button>
      <button class="btn btn-primary btn-block" id="btnMergeEdit" disabled>
        合并并编辑
      </button>
    </div>
  </aside>

</main>

<!-- Progress panel -->
<div class="progress-panel collapsed" id="progressPanel">
  <div class="progress-info">
    <div class="progress-left">
      <span class="progress-title" id="progressTitle">文件解析中</span>
      <span class="progress-detail" id="progressDetail"></span>
    </div>
    <span class="progress-stats" id="progressStats">0 / 0</span>
  </div>
  <div class="progress-track">
    <div class="progress-fill" id="progressFill"></div>
  </div>
</div>

<!-- Editor overlay -->
<div class="editor-overlay hidden" id="editorOverlay">
  <div class="editor-container">
    <div class="editor-header">
      <h2>文档编辑器</h2>
      <div class="editor-actions">
        <div id="editorMergeActions">
          <button class="btn btn-primary" id="btnExportWord">
            <span class="btn-icon-left">📝</span> 导出 Word
          </button>
          <button class="btn btn-primary" id="btnExportPdf">
            <span class="btn-icon-left">📕</span> 导出 PDF
          </button>
          <button class="btn btn-ghost" id="btnCloseEditor">关闭编辑器</button>
        </div>
        <div id="editorSingleActions" class="hidden">
          <button class="btn btn-primary" id="btnSaveFile">保存修改</button>
          <button class="btn btn-ghost" id="btnCancelEdit">取消</button>
        </div>
      </div>
    </div>
    <div class="editor-body">
      <textarea id="editorContent"></textarea>
    </div>
    <div class="editor-loading hidden" id="editorLoading">
      <div class="spinner"></div>
      <p>正在合并文件内容...</p>
    </div>
  </div>
</div>

<!-- Preview modal (for full-screen preview) -->
<div class="modal-overlay hidden" id="previewModal">
  <div class="modal-container">
    <div class="modal-header">
      <h3 id="previewTitle">文件预览</h3>
      <button class="btn btn-ghost" id="btnClosePreview">✕</button>
    </div>
    <div class="modal-body" id="previewBody"></div>
  </div>
</div>

<!-- Hidden inputs -->
<input type="file" id="dirInput" webkitdirectory multiple style="display:none">
<input type="file" id="filesInput" multiple accept=".pdf,.png,.jpg,.jpeg,.docx" style="display:none">

<script src="js/db.js"></script>
<script src="js/parser.js"></script>
<script src="js/search.js"></script>
<script src="js/editor.js"></script>
<script src="js/app.js"></script>
</body>
</html>
